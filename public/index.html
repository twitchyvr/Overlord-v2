<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overlord v2</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="ui/css/tokens.css">
  <link rel="stylesheet" href="ui/css/base.css">
  <link rel="stylesheet" href="ui/css/components.css">
  <link rel="stylesheet" href="ui/css/building.css">
  <link rel="stylesheet" href="ui/css/chat.css">
  <link rel="stylesheet" href="ui/css/views.css">
  <link rel="stylesheet" href="ui/css/responsive.css">

  <!-- Socket.IO client (served by the backend) -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Markdown parser (for chat rendering) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Phase progress bar (top) -->
    <header id="phase-bar" class="phase-bar" role="navigation" aria-label="Project phase progress">
      <div class="phase-step" data-phase="strategy" role="listitem" aria-label="Strategy phase — pending" aria-current="false">
        <span class="phase-dot"></span>
        <span class="phase-label">Strategy</span>
      </div>
      <div class="phase-step" data-phase="discovery" role="listitem" aria-label="Discovery phase — pending" aria-current="false">
        <span class="phase-dot"></span>
        <span class="phase-label">Discovery</span>
      </div>
      <div class="phase-step" data-phase="architecture" role="listitem" aria-label="Architecture phase — pending" aria-current="false">
        <span class="phase-dot"></span>
        <span class="phase-label">Architecture</span>
      </div>
      <div class="phase-step" data-phase="execution" role="listitem" aria-label="Execution phase — pending" aria-current="false">
        <span class="phase-dot"></span>
        <span class="phase-label">Execution</span>
      </div>
      <div class="phase-step" data-phase="review" role="listitem" aria-label="Review phase — pending" aria-current="false">
        <span class="phase-dot"></span>
        <span class="phase-label">Review</span>
      </div>
      <div class="phase-step" data-phase="deploy" role="listitem" aria-label="Deploy phase — pending" aria-current="false">
        <span class="phase-dot"></span>
        <span class="phase-label">Deploy</span>
      </div>
    </header>

    <!-- Navigation toolbar -->
    <nav id="app-toolbar" class="app-toolbar">
      <div class="toolbar-left">
        <button class="toolbar-btn active" data-view="dashboard" title="Dashboard" aria-label="Dashboard" aria-current="page">
          <span class="toolbar-icon">&#9632;</span>
          <span class="toolbar-label">Dashboard</span>
        </button>
        <button class="toolbar-btn" data-view="chat" title="Chat" aria-label="Chat">
          <span class="toolbar-icon">&#9993;</span>
          <span class="toolbar-label">Chat</span>
        </button>
        <button class="toolbar-btn" data-view="tasks" title="Tasks" aria-label="Tasks">
          <span class="toolbar-icon">&#9745;</span>
          <span class="toolbar-label">Tasks</span>
        </button>
        <button class="toolbar-btn" data-view="raid-log" title="RAID Log" aria-label="RAID Log">
          <span class="toolbar-icon">&#9888;</span>
          <span class="toolbar-label">RAID Log</span>
        </button>
        <button class="toolbar-btn" data-view="strategist" title="New Project" aria-label="New Project">
          <span class="toolbar-icon">&#9733;</span>
          <span class="toolbar-label">Strategist</span>
        </button>
      </div>
      <div class="toolbar-center" id="toolbar-panel-toggles" aria-label="Panel visibility toggles">
        <!-- Panel toggle buttons are rendered by initPanelSystem() -->
      </div>
      <div class="toolbar-right">
        <button id="settings-btn" class="toolbar-btn-icon" title="Settings" aria-label="Settings">
          <span>&#9881;</span>
        </button>
        <button id="theme-toggle" class="toolbar-btn-icon" title="Toggle theme" aria-label="Toggle theme">
          <span class="theme-icon-dark">&#9790;</span>
          <span class="theme-icon-light">&#9728;</span>
        </button>
        <span id="toolbar-connection" class="toolbar-connection connected" title="Connected" role="status" aria-live="polite" aria-label="Connection status: Connected">
          <span class="connection-dot"></span>
        </span>
      </div>
    </nav>

    <!-- Main layout: 3-column -->
    <main id="main-layout">
      <!-- Left: Building visualization -->
      <aside id="building-panel"></aside>

      <!-- Center: Chat / Dashboard / Views -->
      <section id="center-panel">
        <!-- Loading state shown before socket connects -->
        <div id="loading-state" class="empty-state">
          <div class="spinner"></div>
          <p class="empty-state-title" style="margin-top: 1rem;">Connecting to Overlord...</p>
        </div>
      </section>

      <!-- Right: Sidebar panels -->
      <aside id="right-panel">
        <!-- Resize handle (left edge drag to widen/shrink right panel) -->
        <div id="panel-resize-handle" class="panel-resize-handle" title="Drag to resize"></div>

        <div id="panel-phase" class="panel">
          <div class="panel-header" data-panel="phase">
            <span class="panel-title">Phase Gates</span>
            <button class="panel-btn-max" title="Maximize">&#10530;</button>
            <span class="panel-chevron">&#9662;</span>
          </div>
          <div class="panel-body"></div>
        </div>
        <div class="panel-divider" aria-hidden="true"></div>

        <div id="panel-agents" class="panel">
          <div class="panel-header" data-panel="agents">
            <span class="panel-title">Agents</span>
            <button class="panel-btn-max" title="Maximize">&#10530;</button>
            <span class="panel-chevron">&#9662;</span>
          </div>
          <div class="panel-body"></div>
        </div>
        <div class="panel-divider" aria-hidden="true"></div>

        <div id="panel-tasks" class="panel">
          <div class="panel-header" data-panel="tasks">
            <span class="panel-title">Tasks</span>
            <button class="panel-btn-max" title="Maximize">&#10530;</button>
            <span class="panel-chevron">&#9662;</span>
          </div>
          <div class="panel-body"></div>
        </div>
        <div class="panel-divider" aria-hidden="true"></div>

        <div id="panel-raid" class="panel">
          <div class="panel-header" data-panel="raid">
            <span class="panel-title">RAID Log</span>
            <button class="panel-btn-max" title="Maximize">&#10530;</button>
            <span class="panel-chevron">&#9662;</span>
          </div>
          <div class="panel-body"></div>
        </div>
        <div class="panel-divider" aria-hidden="true"></div>

        <div id="panel-activity" class="panel">
          <div class="panel-header" data-panel="activity">
            <span class="panel-title">Activity</span>
            <button class="panel-btn-max" title="Maximize">&#10530;</button>
            <span class="panel-chevron">&#9662;</span>
          </div>
          <div class="panel-body"></div>
        </div>
        <div class="panel-divider" aria-hidden="true"></div>

        <div id="panel-projects" class="panel">
          <div class="panel-header" data-panel="projects">
            <span class="panel-title">Projects</span>
            <button class="panel-btn-max" title="Maximize">&#10530;</button>
            <span class="panel-chevron">&#9662;</span>
          </div>
          <div class="panel-body"></div>
        </div>
        <div class="panel-divider" aria-hidden="true"></div>

        <div id="panel-tools" class="panel">
          <div class="panel-header" data-panel="tools">
            <span class="panel-title">Tools</span>
            <button class="panel-btn-max" title="Maximize">&#10530;</button>
            <span class="panel-chevron">&#9662;</span>
          </div>
          <div class="panel-body"></div>
        </div>
        <div class="panel-divider" aria-hidden="true"></div>

        <div id="panel-logs" class="panel">
          <div class="panel-header" data-panel="logs">
            <span class="panel-title">Logs</span>
            <button class="panel-btn-max" title="Maximize">&#10530;</button>
            <span class="panel-chevron">&#9662;</span>
          </div>
          <div class="panel-body"></div>
        </div>
        <div class="panel-divider" aria-hidden="true"></div>

        <div id="panel-team" class="panel">
          <div class="panel-header" data-panel="team">
            <span class="panel-title">Team</span>
            <button class="panel-btn-max" title="Maximize">&#10530;</button>
            <span class="panel-chevron">&#9662;</span>
          </div>
          <div class="panel-body"></div>
        </div>
      </aside>
    </main>

    <!-- Mobile bottom nav -->
    <nav id="mobile-nav" aria-label="Mobile navigation">
      <button class="mobile-nav-item active" data-view="dashboard" aria-label="Home" aria-current="page">
        <span class="mobile-nav-icon">&#9632;</span>
        <span>Home</span>
      </button>
      <button class="mobile-nav-item" data-view="chat" aria-label="Chat">
        <span class="mobile-nav-icon">&#9993;</span>
        <span>Chat</span>
      </button>
      <button class="mobile-nav-item" data-view="tasks" aria-label="Tasks">
        <span class="mobile-nav-icon">&#9745;</span>
        <span>Tasks</span>
      </button>
      <button class="mobile-nav-item" data-view="raid-log" aria-label="RAID Log">
        <span class="mobile-nav-icon">&#9888;</span>
        <span>RAID</span>
      </button>
      <button class="mobile-nav-item" data-view="agents" aria-label="Agents">
        <span class="mobile-nav-icon">&#9679;</span>
        <span>Agents</span>
      </button>
    </nav>

    <!-- Modal root -->
    <div id="modal-root"></div>

    <!-- Toast container -->
    <div id="toast-container"></div>
  </div>

  <!-- Bootstrap -->
  <script type="module" src="ui/boot.js"></script>
</body>
</html>
