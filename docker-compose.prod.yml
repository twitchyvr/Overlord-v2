# ═══════════════════════════════════════════════════════
# Overlord v2 — Production Compose
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml down
#   docker compose -f docker-compose.prod.yml logs -f
#
# Builds the multi-stage Dockerfile and runs the
# production server with only compiled output.
# ═══════════════════════════════════════════════════════

version: '3.8'

services:
  overlord:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: overlord-v2
    ports:
      - "4000:4000"
    volumes:
      # Persist SQLite database outside the container
      - overlord_data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DB_PATH=/app/data/overlord.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  overlord_data:
    driver: local
