name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: 'New Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'bug'
  - title: 'Architecture & Refactoring'
    labels:
      - 'refactor'
      - 'architecture'
  - title: 'Performance'
    labels:
      - 'performance'
  - title: 'Documentation'
    labels:
      - 'documentation'
  - title: 'CI/CD & Infrastructure'
    labels:
      - 'ci/cd'
      - 'dependencies'
  - title: 'Security'
    labels:
      - 'security'
  - title: 'Breaking Changes'
    labels:
      - 'breaking-change'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - 'breaking-change'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'performance'
      - 'refactor'
  default: patch
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
