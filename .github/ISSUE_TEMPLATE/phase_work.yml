name: Task / Work Item
description: Track a specific implementation task within a milestone
title: "[task]: "
labels: ["triage"]
body:
  - type: markdown
    attributes:
      value: |
        Define a concrete, deliverable work item. Every task goes through the
        8-stage Continuous Development Loop before it can be closed.

  - type: dropdown
    id: type
    attributes:
      label: Work Type
      options:
        - Feature implementation
        - Bug fix
        - UI/UX improvement
        - Performance optimization
        - Testing (unit, integration, E2E)
        - Infrastructure / DevOps
        - Spike / Research
        - Documentation
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Target Layer(s)
      multiple: true
      options:
        - Core
        - Transport
        - Rooms
        - Agents
        - Tools
        - AI
        - Storage
        - Plugins
        - UI
        - E2E Tests
        - CI/CD
        - Infrastructure
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done? Be specific.
    validations:
      required: true

  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: What files/modules will this produce or modify?
      placeholder: |
        - [ ] src/rooms/pipeline.ts (new)
        - [ ] src/storage/db.ts (modify — add table)
        - [ ] tests/unit/rooms/pipeline.test.ts (new)
        - [ ] tests/e2e/pipeline.spec.ts (new — Playwright)
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: What must be completed before this can start?
      placeholder: |
        - Depends on #NNN
        - Requires database migration from #NNN

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: |
        How do we know this is done? Remember: every task must pass all 8 stages
        of the CDL (Code → Iterate → Static Test → Deep Static Test → Check Syntax →
        Code Review → E2E → Dogfood) before closure.
      placeholder: |
        - [ ] Implementation complete
        - [ ] Unit tests pass (npm test)
        - [ ] Type check passes (tsc --noEmit)
        - [ ] Lint passes (eslint)
        - [ ] Playwright E2E test written and passing
        - [ ] Dogfooded through the UI
    validations:
      required: true
