name: Feature Request
description: Propose a new feature or enhancement
title: "[feature]: "
labels: ["feature", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see in Overlord v2.

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - New Room Type
        - New Tool
        - New Agent Capability
        - Room Contract / Exit Document
        - Phase Gate Enhancement
        - RAID Log Enhancement
        - Pipeline / Quality Enforcement
        - Plugin / Scripting
        - AI Provider Integration
        - UI / Dashboard / Views
        - Navigation / Layout
        - Settings / Configuration
        - Cloud / Deployment
        - Gateway / Remote Execution
        - Multi-Repo / Project Composition
        - CLI / Commands
        - Performance / Scalability
        - Accessibility
        - Mobile / Responsive
        - Other
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Target Layer(s)
      description: Which architectural layers will this touch?
      multiple: true
      options:
        - Core
        - Transport
        - Rooms
        - Agents
        - Tools
        - AI
        - Storage
        - Plugins
        - UI
        - E2E Tests
        - CI/CD
        - Infrastructure / Cloud
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Suggested Priority
      options:
        - Critical — Must have for current milestone
        - High — Should have for current milestone
        - Medium — Next milestone
        - Low — Nice to have, no rush
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      description: How large is this feature?
      options:
        - Small — Single file change, < 1 hour
        - Medium — Multiple files, < 1 day
        - Large — Multiple modules, multi-day
        - Epic — Cross-cutting, needs breakdown into sub-issues
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Who is affected?
      placeholder: "Currently, users cannot... This means..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work? Include UI mockups, API design, or architecture notes.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches were considered and why were they rejected?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this feature is complete? Include E2E test expectations.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Playwright E2E test verifies the feature works through the UI
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: Related Issues
      description: Link any related issues, epics, or discussions
      placeholder: |
        - Related to #NNN
        - Part of epic #NNN
        - Depends on #NNN
