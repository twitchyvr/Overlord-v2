name: Feature Request
description: Propose a new feature or enhancement
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see in Overlord v2.

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - New Room Type
        - New Tool
        - New Agent Capability
        - Room Contract / Exit Document
        - Phase Gate Enhancement
        - RAID Log Enhancement
        - Plugin / Scripting
        - AI Provider Integration
        - UI / Dashboard
        - CLI / Commands
        - Performance / Scalability
        - Other
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Target Layer
      options:
        - Core
        - Transport
        - Rooms
        - Agents
        - Tools
        - AI
        - Storage
        - Plugins
        - UI
        - Multiple Layers
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "Currently, agents cannot... This means..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this feature is complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
