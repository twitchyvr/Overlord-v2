name: Bug Report
description: Report a bug in Overlord v2
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: dropdown
    id: discovery
    attributes:
      label: How was this discovered?
      description: How did you find this bug?
      options:
        - Manual testing / dogfooding
        - Playwright E2E test failure
        - Unit test failure
        - User report
        - Code review
        - Runtime error / crash
        - Visual inspection (UI)
        - Other
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Affected Layer
      description: Which architectural layer is affected?
      options:
        - Core (bus, config, contracts)
        - Transport (socket, API, schemas)
        - Rooms (room-manager, room-types, phase-gates, pipeline)
        - Agents (registry, conversation-loop, session)
        - Tools (registry, executor, providers)
        - AI (providers, streaming, adapters)
        - Storage (database, migrations)
        - Plugins (loader, sandbox, scripting)
        - UI (views, components, CSS, socket-bridge)
        - E2E Tests (Playwright specs)
        - CI/CD (GitHub Actions, build)
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical — App crashes, data loss, or security issue
        - High — Major feature broken, no workaround
        - Medium — Feature partially broken, workaround exists
        - Low — Minor visual or cosmetic issue
    validations:
      required: true

  - type: dropdown
    id: floor
    attributes:
      label: Affected Floor (if applicable)
      description: Which building floor is affected?
      options:
        - N/A
        - Strategy Floor
        - Collaboration Floor
        - Execution Floor
        - Operations Floor
        - Governance Floor
        - Integration Floor
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Navigate to '...'
        2. Click on '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recording
      description: If applicable, add screenshots or screen recordings to help explain the problem
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Error Output
      description: Paste any relevant log output (server console, browser console, test output)
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant environment details
      placeholder: |
        - Overlord version: (from package.json)
        - Node.js version:
        - Browser:
        - OS:
    validations:
      required: false

  - type: textarea
    id: e2e_test
    attributes:
      label: Playwright E2E Test
      description: |
        If a Playwright test should be written to prevent regression, describe what it should verify.
        (Per project rules, every fix MUST have an E2E test before the issue can be closed.)
      placeholder: |
        Test should:
        - Navigate to the affected view
        - Reproduce the scenario
        - Assert the correct behavior
