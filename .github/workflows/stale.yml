name: Stale Issues & PRs

on:
  schedule:
    - cron: '30 1 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            not had recent activity. It will be closed in 14 days if no
            further activity occurs. If this issue is still relevant, please
            leave a comment.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has
            not had recent activity. It will be closed in 7 days if no
            further activity occurs.
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          days-before-stale: 30
          days-before-close: 14
          days-before-pr-close: 7
          exempt-issue-labels: 'blocked,priority: critical,priority: high'
          exempt-pr-labels: 'blocked,priority: critical'
