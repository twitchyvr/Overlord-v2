name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to Overlord v2! Thanks for opening your first issue.

            A few helpful links:
            - [Wiki](https://github.com/twitchyvr/Overlord-v2/wiki) — Architecture docs, setup guide
            - [Contributing Guide](https://github.com/twitchyvr/Overlord-v2/blob/main/CONTRIBUTING.md)
            - [Discussions](https://github.com/twitchyvr/Overlord-v2/discussions) — Questions and ideas

            We'll take a look at this soon!
          pr-message: |
            Welcome to Overlord v2! Thanks for your first pull request.

            Please ensure:
            - All CI checks pass (lint, typecheck, tests, architecture, build)
            - The PR template checklist is completed
            - Changes are linked to a GitHub Issue

            A maintainer will review this shortly.
